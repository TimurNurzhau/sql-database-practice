name: SQL Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Test Vehicles DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE vehicles_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot vehicles_db < vehicles_db/dump.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot vehicles_db < vehicles_db/tasks.sql > vehicles_db/output.txt
          echo "Vehicles DB tests completed"

      - name: Test Racing DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE racing_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db < racing_db/dump.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db < racing_db/tasks.sql > racing_db/output.txt
          echo "Racing DB tests completed"

      - name: Test Hotels DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE hotels_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db < hotels_db/dump.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db < hotels_db/tasks.sql > hotels_db/output.txt
          echo "Hotels DB tests completed"

      - name: Test Organization DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE organization_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db < organization_db/dump.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db < organization_db/tasks.sql > organization_db/output.txt
          echo "Organization DB tests completed"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: sql-results
          path: |
            vehicles_db/output.txt
            racing_db/output.txt
            hotels_db/output.txt
            organization_db/output.txt