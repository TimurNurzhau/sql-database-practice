name: SQL Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Test Vehicles DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE vehicles_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot vehicles_db < vehicles_db/create_tables.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot vehicles_db < vehicles_db/insert_data.sql
          
          echo "Testing Task 1..."
          mysql -h127.0.0.1 -P3306 -uroot -proot vehicles_db --skip-column-names < vehicles_db/task1.sql | tr -s ' ' > vehicles_db/output_task1.txt
          diff vehicles_db/output_task1.txt vehicles_db/expected_task1.txt || exit 1
          
          echo "Testing Task 2..."
          mysql -h127.0.0.1 -P3306 -uroot -proot vehicles_db --skip-column-names < vehicles_db/task2.sql | tr -s ' ' > vehicles_db/output_task2.txt
          diff vehicles_db/output_task2.txt vehicles_db/expected_task2.txt || exit 1
          
          echo "All Vehicles DB tests passed!"

      - name: Test Racing DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE racing_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db < racing_db/create_tables.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db < racing_db/insert_data.sql
          
          echo "Testing Task 1..."
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db --skip-column-names < racing_db/task1.sql | tr -s ' ' > racing_db/output_task1.txt
          diff racing_db/output_task1.txt racing_db/expected_task1.txt || exit 1
          
          echo "Testing Task 2..."
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db --skip-column-names < racing_db/task2.sql | tr -s ' ' > racing_db/output_task2.txt
          diff racing_db/output_task2.txt racing_db/expected_task2.txt || exit 1
          
          echo "Testing Task 3..."
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db --skip-column-names < racing_db/task3.sql | tr -s ' ' > racing_db/output_task3.txt
          diff racing_db/output_task3.txt racing_db/expected_task3.txt || exit 1
          
          echo "Testing Task 4..."
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db --skip-column-names < racing_db/task4.sql | tr -s ' ' > racing_db/output_task4.txt
          diff racing_db/output_task4.txt racing_db/expected_task4.txt || exit 1
          
          echo "Testing Task 5..."
          mysql -h127.0.0.1 -P3306 -uroot -proot racing_db --skip-column-names < racing_db/task5.sql | tr -s ' ' > racing_db/output_task5.txt
          diff racing_db/output_task5.txt racing_db/expected_task5.txt || exit 1
          
          echo "All Racing DB tests passed!"

      - name: Test Hotels DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE hotels_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db < hotels_db/create_tables.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db < hotels_db/insert_data.sql
          
          echo "Testing Task 1..."
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db --skip-column-names < hotels_db/task1.sql | tr -s ' ' > hotels_db/output_task1.txt
          diff hotels_db/output_task1.txt hotels_db/expected_task1.txt || exit 1
          
          echo "Testing Task 2..."
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db --skip-column-names < hotels_db/task2.sql | tr -s ' ' > hotels_db/output_task2.txt
          diff hotels_db/output_task2.txt hotels_db/expected_task2.txt || exit 1
          
          echo "Testing Task 3..."
          mysql -h127.0.0.1 -P3306 -uroot -proot hotels_db --skip-column-names < hotels_db/task3.sql | tr -s ' ' > hotels_db/output_task3.txt
          diff hotels_db/output_task3.txt hotels_db/expected_task3.txt || exit 1
          
          echo "All Hotels DB tests passed!"

      - name: Test Organization DB
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE organization_db;"
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db < organization_db/create_tables.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db < organization_db/insert_data.sql
          
          echo "Testing Task 1..."
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db --skip-column-names < organization_db/task1.sql | tr -s ' ' > organization_db/output_task1.txt
          diff organization_db/output_task1.txt organization_db/expected_task1.txt || exit 1
          
          echo "Testing Task 2..."
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db --skip-column-names < organization_db/task2.sql | tr -s ' ' > organization_db/output_task2.txt
          diff organization_db/output_task2.txt organization_db/expected_task2.txt || exit 1
          
          echo "Testing Task 3..."
          mysql -h127.0.0.1 -P3306 -uroot -proot organization_db --skip-column-names < organization_db/task3.sql | tr -s ' ' > organization_db/output_task3.txt
          diff organization_db/output_task3.txt organization_db/expected_task3.txt || exit 1
          
          echo "All Organization DB tests passed!"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sql-results
          path: |
            **/output_*.txt